<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ItemGraze Content Scheduler — Plan and manage your Pinterest content efficiently</title>
<meta name="description" content="Schedule Pins, auto-post to boards, and grow your Pinterest — all with one dashboard." />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { font-family: 'Inter', system-ui, sans-serif; }
  .fade-in { animation: fade .35s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pulse-dot { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  .toast-in { animation: toast .4s cubic-bezier(.2,.9,.3,1.3) both; }
  @keyframes toast { from { opacity: 0; transform: translateY(20px) scale(.95); } to { opacity: 1; transform: none; } }
  .modal-in { animation: modal .25s ease both; }
  @keyframes modal { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }
  .backdrop-in { animation: bd .25s ease both; }
  @keyframes bd { from { opacity: 0; } to { opacity: 1; } }
  .gradient-bg { background: radial-gradient(1000px 500px at 80% -10%, #fee2e2 0%, transparent 60%), radial-gradient(800px 500px at 0% 0%, #fef3c7 0%, transparent 60%), #ffffff; }
  .pin-card { transition: all .2s ease; }
  .pin-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px -12px rgba(0,0,0,.18); }
</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

<div id="app"></div>
<div id="toast-root" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2"></div>
<div id="modal-root"></div>

<script>
// ─── Mock State ────────────────────────────────────────────────────────────
const state = {

  username: localStorage.getItem('pin_username') || '',
  boards: [
    { id: 'b1', name: 'Kitchen Gadgets', pins: 42, cover: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=200' },
    { id: 'b2', name: 'Car Accessories', pins: 18, cover: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=200' },
    { id: 'b3', name: 'Home Decor Finds', pins: 67, cover: 'https://images.unsplash.com/photo-1513694203232-719a280e022f?w=200' },
    { id: 'b4', name: 'Travel Essentials', pins: 25, cover: 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=200' },
  ],

    { id: 'p1', title: 'Portable Blender — Morning Smoothies', board: 'Kitchen Gadgets', image: 'https://images.unsplash.com/photo-1570197571499-166b36435e9f?w=400', scheduledAt: '2026-04-10 09:00', status: 'Scheduled' },
    { id: 'p2', title: 'LED Car Charger Dual Port', board: 'Car Accessories', image: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=400', scheduledAt: '2026-04-09 14:30', status: 'Scheduled' },
    { id: 'p3', title: 'Minimalist Desk Lamp', board: 'Home Decor Finds', image: 'https://images.unsplash.com/photo-1513506003901-1e6a229e2d15?w=400', scheduledAt: '2026-04-08 18:00', status: 'Posted' },
    { id: 'p4', title: 'Travel Neck Pillow', board: 'Travel Essentials', image: 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=400', scheduledAt: '2026-04-07 11:00', status: 'Posted' },
  ])),
};

function persist() {
  localStorage.setItem('pin_connected', JSON.stringify(state.connected));
  localStorage.setItem('pin_username', state.username);
  localStorage.setItem('pin_scheduled', JSON.stringify(state.scheduledPins));
}

// ─── Router ────────────────────────────────────────────────────────────────
const routes = {
  '': renderLanding,
  'dashboard': renderDashboard,
  'create': renderCreate,
  'scheduled': renderScheduled,
  'settings': renderSettings,
};

function go(path) { location.hash = path; }

function router() {
  const hash = location.hash.replace('#/', '').replace('#', '').split('?')[0];
  // ignore anchor links on landing
  if (['features','how'].includes(hash)) return;
  const render = routes[hash] || renderLanding;
  const needsAuth = ['dashboard', 'create', 'scheduled', 'settings'].includes(hash);
  if (needsAuth && !state.connected) { go(''); return; }
  render();
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', router);

// ─── Toast & Modal ─────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  const colors = { success: 'bg-emerald-600', error: 'bg-rose-600', info: 'bg-slate-800' };
  el.className = `toast-in ${colors[type]} text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2 font-medium`;
  el.innerHTML = `${type === 'success' ? icon.check : ''}<span>${msg}</span>`;
  root.appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}

function showModal(html) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="backdrop-in fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
      <div class="modal-in bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden">${html}</div>
    </div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ─── Connect Flow ──────────────────────────────────────────────────────────
function connectPinterest() {
  showModal(`
    <div class="p-8 text-center">
      <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600">${icon.pinterest}</div>
      <h3 class="text-xl font-bold mb-2">Redirecting to Pinterest OAuth...</h3>
      <p class="text-slate-500 text-sm mb-6">You'll be asked to authorize <b>ItemGraze Content Scheduler</b> to post to your boards.</p>
      <div class="flex items-center justify-center gap-2 text-slate-400">
        <div class="w-6 h-6 border-2 border-red-500 border-t-transparent rounded-full spin"></div>
        <span class="text-sm">Connecting securely...</span>
      </div>
    </div>
  `);
  setTimeout(() => {
    showModal(`
      <div class="p-8 text-center">
        <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-600">${icon.check}</div>
        <h3 class="text-xl font-bold mb-1">Connected successfully!</h3>
        <p class="text-slate-500 text-sm mb-2">Authorized via Pinterest OAuth</p>
        <div class="bg-slate-50 rounded-xl p-4 my-4 text-left">
          <div class="text-xs text-slate-400 uppercase tracking-wide">Connected account</div>
          <div class="flex items-center gap-3 mt-2">
            <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-pink-500 rounded-full flex items-center justify-center text-white font-bold">K</div>
            <div>
              <div class="font-semibold">@keymaking_creates</div>
              <div class="text-xs text-slate-500">4 boards · 152 pins</div>
            </div>
          </div>
        </div>
        <button onclick="finishConnect()" class="w-full bg-slate-900 text-white font-semibold py-3 rounded-xl hover:bg-slate-800 transition">Go to Dashboard</button>
      </div>
    `);
  }, 1800);
}

function finishConnect() {
  state.connected = true;
  state.username = '@keymaking_creates';
  persist();
  closeModal();
  toast('Pinterest account connected');
  go('dashboard');
}

function disconnectPinterest() {
  state.connected = false;
  state.username = '';
  persist();
  toast('Disconnected from Pinterest', 'info');
  go('');
}

// ─── Sidebar ───────────────────────────────────────────────────────────────

// ─── Dashboard ─────────────────────────────────────────────────────────────
function renderDashboard() {
  const totalPins = state.scheduledPins.length;
  const scheduled = state.scheduledPins.filter(p => p.status === 'Scheduled').length;
  const posted = state.scheduledPins.filter(p => p.status === 'Posted').length;

  document.getElementById('app').innerHTML = `
    <div class="flex min-h-screen bg-slate-50 fade-in">
      ${sidebar('dashboard')}
      <main class="flex-1 p-8 overflow-x-hidden">
        <div class="flex items-center justify-between mb-8 max-w-6xl">
          <div>
            <h1 class="text-3xl font-bold">Dashboard</h1>
            <p class="text-slate-500 mt-1">Welcome back, here's your Pinterest overview.</p>
          </div>
          <a href="#create" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-5 py-2.5 rounded-xl flex items-center gap-2 shadow-lg shadow-red-600/20">${icon.plus} Create Pin</a>
        </div>

        <div class="grid md:grid-cols-4 gap-4 mb-8 max-w-6xl">
          ${[
            { label: 'Total Pins', value: totalPins, color: 'bg-red-50 text-red-600', i: icon.grid },
            { label: 'Scheduled', value: scheduled, color: 'bg-amber-50 text-amber-600', i: icon.clock },
            { label: 'Published', value: posted, color: 'bg-emerald-50 text-emerald-600', i: icon.check },
            { label: 'Boards', value: state.boards.length, color: 'bg-indigo-50 text-indigo-600', i: icon.pinterest },
          ].map(s => `
            <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
              <div class="flex items-start justify-between">
                <div>
                  <div class="text-sm text-slate-500">${s.label}</div>
                  <div class="text-3xl font-bold mt-1">${s.value}</div>
                </div>
                <div class="w-10 h-10 rounded-xl flex items-center justify-center ${s.color}">${s.i}</div>
              </div>
            </div>
          `).join('')}

        <div class="max-w-6xl">
          <div class="flex items-center justify-between mb-4">

          </div>
          <div class="bg-white border border-slate-200 rounded-2xl divide-y divide-slate-100">
            ${state.scheduledPins.slice(0, 4).map(p => `
              <div class="flex items-center gap-4 p-4">
                <img src="${p.image}" class="w-14 h-14 object-cover rounded-lg" />

}

// ─── Create Pin ────────────────────────────────────────────────────────────

  document.getElementById('app').innerHTML = `

      ${sidebar('create')}
      <main class="flex-1 p-8 max-w-5xl">
        <h1 class="text-3xl font-bold mb-1">Create Pin</h1>
        <p class="text-slate-500 mb-8">Post instantly or schedule for later.</p>

        <form onsubmit="return false" class="grid md:grid-cols-2 gap-6">
          <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm space-y-5">
            <div>
              <label class="text-sm font-semibold text-slate-700 block mb-1.5">Board</label>
              <select id="f-board" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 bg-white">

            <div>

            </div>
            <div class="flex gap-3 pt-2">
              <button onclick="publishPin(false)" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-red-600/20">${icon.send} Publish Now</button>
              <button onclick="publishPin(true)" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2">${icon.calendar} Schedule</button>
            </div>
            <p class="text-xs text-slate-400 text-center pt-2">All actions require user authorization via Pinterest OAuth.</p>
          </div>

          <div>
            <div class="sticky top-8">
              <div class="text-sm font-semibold text-slate-500 mb-3 uppercase tracking-wide">Live preview</div>
              <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm pin-card">
                <img id="preview-img" src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=600" class="w-full aspect-[3/4] object-cover" />
                <div class="p-4">
                  <div id="preview-title" class="font-bold">Portable Blender — 5-Second Smoothies</div>
                  <div class="flex items-center gap-2 mt-3 text-xs text-slate-500">
                    <div class="w-6 h-6 bg-gradient-to-br from-red-500 to-pink-500 rounded-full flex items-center justify-center text-white font-bold">K</div>
                    ${state.username}
                  </div>
                </div>
              </div>
            </div>

        </form>
      </main>

  `;
}

function updatePreview() {
  const img = document.getElementById('f-image').value;
  const title = document.getElementById('f-title').value;
  document.getElementById('preview-img').src = img;
  document.getElementById('preview-title').textContent = title;
}

function publishPin(schedule) {
  const title = document.getElementById('f-title').value.trim();
  const image = document.getElementById('f-image').value.trim();
  const board = document.getElementById('f-board').value;
  const when = document.getElementById('f-date').value || '2026-04-15T10:00';
  if (!title || !image) { toast('Title and image required', 'error'); return; }

  showModal(`
    <div class="p-8 text-center">
      <div class="w-12 h-12 border-4 border-red-500 border-t-transparent rounded-full spin mx-auto mb-4"></div>
      <div class="font-semibold">${schedule ? 'Scheduling pin...' : 'Publishing to Pinterest...'}</div>
      <div class="text-sm text-slate-500 mt-1">Calling Pinterest API</div>
    </div>
  `);

  setTimeout(() => {
    const newPin = {
      id: 'p' + Date.now(),
      title, board, image,
      scheduledAt: schedule ? when.replace('T', ' ') : new Date().toISOString().slice(0, 16).replace('T', ' '),
      status: schedule ? 'Scheduled' : 'Posted',
    };
    state.scheduledPins.unshift(newPin);
    persist();
    closeModal();
    toast(schedule ? 'Pin scheduled successfully' : 'Pin published successfully');
    go('scheduled');
  }, 1500);
}

// ─── Scheduled ─────────────────────────────────────────────────────────────

  document.getElementById('app').innerHTML = `
    <div class="flex min-h-screen bg-slate-50 fade-in">

        </div>

        ${state.scheduledPins.length === 0 ? `

            <a href="#create" class="text-red-600 font-semibold">Create your first pin →</a>

        ` : `
          <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
            ${state.scheduledPins.map(p => `

                <div class="relative">
                  <img src="${p.image}" class="w-full h-56 object-cover" />
                  <span class="absolute top-3 right-3 text-xs font-bold px-3 py-1 rounded-full ${p.status === 'Posted' ? 'bg-emerald-500 text-white' : 'bg-amber-500 text-white'}">${p.status}</span>
                </div>
                <div class="p-4">
                  <div class="font-bold mb-1 line-clamp-2">${p.title}</div>
                  <div class="text-xs text-slate-500 mb-3">📌 ${p.board}</div>
                  <div class="flex items-center justify-between pt-3 border-t border-slate-100">

function deletePin(id) {
  state.scheduledPins = state.scheduledPins.filter(p => p.id !== id);
  persist();
  toast('Pin removed', 'info');
  renderScheduled();
}
